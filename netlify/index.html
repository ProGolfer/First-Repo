<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golf Money Game</title>
  <script>
    window.addEventListener('error', function(e) {
      alert('Error: ' + e.message);
    });
    alert('Page loading...');
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    setTimeout(function() {
      alert('Supabase loaded: ' + (typeof window.supabase));
    }, 2000);
  </script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#1a472a;min-height:100vh;padding:20px}
    .container{max-width:480px;margin:0 auto}
    .card{background:white;border-radius:16px;padding:24px;margin-bottom:16px}
    .header{background:linear-gradient(135deg,#1a472a,#2d5a27);color:white;padding:20px;border-radius:16px 16px 0 0;margin:-24px -24px 20px -24px;text-align:center}
    h1{font-size:22px}
    .form-group{margin-bottom:16px}
    label{display:block;margin-bottom:6px;font-weight:600}
    input,select{width:100%;padding:12px;border:2px solid #ddd;border-radius:8px;font-size:16px}
    .btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px}
    .btn-primary{background:#2d5a27;color:white}
    .btn-secondary{background:#eee;color:#333}
    .hidden{display:none}
    ul{list-style:none;padding:0}
    li{padding:10px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
    .badge{background:#2d5a27;color:white;padding:2px 8px;border-radius:10px;font-size:12px}
  </style>
</head>
<body>
  <div class="container">
    <div id="view-home" class="card">
      <div class="header"><h1>⛳ Golf Money Game</h1></div>
      <div class="form-group">
        <label>Course</label>
        <select id="course"><option>Cliffside Golf Club</option></select>
      </div>
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="name" placeholder="Enter name">
      </div>
      <button class="btn btn-primary" onclick="doRegister()">Register</button>
      <div style="margin-top:16px">
        <strong>Registered:</strong> <span id="count">0</span>
        <ul id="list"></ul>
      </div>
      <button class="btn btn-secondary" style="margin-top:16px" onclick="showAdmin()">🔒 Admin</button>
    </div>
    <div id="view-admin" class="card hidden">
      <div class="header"><h1>Admin</h1></div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="pass" placeholder="Password">
      </div>
      <button class="btn btn-primary" onclick="doLogin()">Login</button>
      <button class="btn btn-secondary" onclick="showHome()">Back</button>
    </div>
    <div id="view-dash" class="card hidden">
      <div class="header"><h1>Dashboard</h1></div>
      <ul id="admin-list"></ul>
      <button class="btn btn-secondary" onclick="showHome()">Logout</button>
    </div>
  </div>
  <script>
    const SUPABASE_URL = 'https://uwkmmrqnpnhlustrxees.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3a21tcnFucG5obHVzdHJ4ZWVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjA5NDIsImV4cCI6MjA5MTI5Njk0Mn0.yHsEZIxvHnLX7WIoUT1CPm8opl0iY3ll-oFetHqht5E';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let players = [];
    async function loadPlayers() { const { data } = await supabase.from('players').select('*'); players = data || []; render(); }
    function render() { const approved = players.filter(p => p.status === 'approved'); document.getElementById('count').textContent = approved.length; document.getElementById('list').innerHTML = approved.map(p => '<li>' + p.name + ' <span class="badge">Team ' + (p.team || '-') + '</span></li>').join('') || '<li>No players yet</li>'; document.getElementById('admin-list').innerHTML = players.map(p => '<li>' + p.name + ' (' + p.status + ') <button onclick="toggle(\'' + p.id + '\',\'' + p.status + '\')">' + (p.status==='approved'?'✗':'✓') + '</button></li>').join(''); }
    async function doRegister() { var name = document.getElementById('name').value.trim(); if (!name) return alert('Enter your name!'); await supabase.from('players').insert([{ name: name, course: document.getElementById('course').value, status: 'pending' }]); document.getElementById('name').value = ''; alert('Registered!'); loadPlayers(); }
    function doLogin() { if (document.getElementById('pass').value === 'golf123') { loadPlayers(); document.getElementById('view-admin').classList.add('hidden'); document.getElementById('view-dash').classList.remove('hidden'); } else { alert('Wrong password'); } }
    async function toggle(id, status) { await supabase.from('players').update({status: status==='approved'?'pending':'approved'}).eq('id', id); loadPlayers(); }
    function showAdmin() { document.getElementById('view-home').classList.add('hidden'); document.getElementById('view-admin').classList.remove('hidden'); }
    function showHome() { document.getElementById('view-dash').classList.add('hidden'); document.getElementById('view-admin').classList.add('hidden'); document.getElementById('view-home').classList.remove('hidden'); }
    loadPlayers();
  </script>
</body>
</html>
