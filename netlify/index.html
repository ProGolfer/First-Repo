<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golf Money Game</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://uwkmmrqnpnhlustrxees.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3a21tcnFucG5obHVzdHJ4ZWVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjA5NDIsImV4cCI6MjA5MTI5Njk0Mn0.yHsEZIxvHnLX7WIoUT1CPm8opl0iY3ll-oFetHqht5E';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    supabase.channel('players').on('postgres_changes', {event:'*', schema:'public', table:'players'}, ()=>loadPlayers()).subscribe();
    let players = [];
    async function loadPlayers(){ const{data}=await supabase.from('players').select('*'); players=data||[]; renderPlayers(); }
    async function savePlayer(p){ await supabase.from('players').insert([p]); }
  </script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(135deg,#1a472a,#2d5a27);min-height:100vh;padding:20px}.container{max-width:500px;margin:0 auto}.card{background:white;border-radius:20px;padding:20px;margin-bottom:16px;box-shadow:0 8px 30px rgba(0,0,0,0.2)}.header{background:linear-gradient(135deg,#1a472a,#2d5a27);color:white;padding:25px;text-align:center;border-radius:20px 20px 0 0;margin:-20px -20px 20px -20px}.header h1{font-size:24px}.form-group{margin-bottom:16px}.form-group label{display:block;margin-bottom:8px;font-weight:600}.form-group input,.form-group select{width:100%;padding:14px;border:2px solid #e0e0e0;border-radius:12px}.btn{width:100%;padding:16px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:8px}.btn-primary{background:linear-gradient(135deg,#1a472a,#2d5a27);color:white}.btn-secondary{background:#f5f5f5;color:#333}.hidden{display:none}
  </style>
</head>
<body>
  <div class="container">
    <div id="view-home" class="card">
      <div class="header"><h1>⛳ Golf Money Game</h1></div>
      <div class="form-group"><label>Select Course</label><select id="course"><option>Cliffside Golf Club</option><option>Pebble Beach</option></select></div>
      <div class="form-group"><label>Your Name</label><input type="text" id="name" placeholder="Enter your name"></div>
      <div class="form-group"><label>Phone</label><input type="tel" id="phone" placeholder="(555) 123-4567"></div>
      <button class="btn btn-primary" onclick="registerPlayer()">Register for Today</button>
      <div class="players-section"><h3>Registered Players</h3><ul id="player-list"></ul></div>
      <button class="btn btn-secondary" onclick="showView('view-admin')">🔒 Admin</button>
    </div>
    <div id="view-admin" class="card hidden">
      <div class="header"><h1>🔐 Admin</h1></div>
      <div class="form-group"><label>Password</label><input type="password" id="admin-pass" placeholder="Password"></div>
      <button class="btn btn-primary" onclick="adminLogin()">Login</button>
      <button class="btn btn-secondary" onclick="showView('view-home')">Back</button>
    </div>
    <div id="view-dashboard" class="card hidden">
      <div class="header"><h1>⚙️ Admin Dashboard</h1></div>
      <h3>Players</h3><ul id="admin-list"></ul>
      <button class="btn btn-secondary" onclick="showView('view-home')">Logout</button>
    </div>
  </div>
  <script>
    function showView(v){document.querySelectorAll('.card').forEach(e=>e.classList.add('hidden'));document.getElementById(v).classList.remove('hidden');}
    async function registerPlayer(){const name=document.getElementById('name').value.trim();if(!name){alert('Enter name');return;}await savePlayer({name,status:'pending',course:document.getElementById('course').value});document.getElementById('name').value='';alert('Registered!');loadPlayers();}
    function renderPlayers(){const approved=players.filter(p=>p.status==='approved');document.getElementById('player-list').innerHTML=approved.map(p=>`<li>${p.name}</li>`).join('')||'<li>No players yet</li>';}
    function adminLogin(){if(document.getElementById('admin-pass').value==='golf123'){showView('view-dashboard');renderAdmin();}else{alert('Wrong password');}}
    function renderAdmin(){document.getElementById('admin-list').innerHTML=players.map(p=>`<li>${p.name} - ${p.status} <button onclick="toggle('${p.id}','${p.status}')">${p.status==='approved'?'✗':'✓'}</button></li>`).join('');}
    async function toggle(id,status){await supabase.from('players').update({status:status==='approved'?'pending':'approved'}).eq('id',id);loadPlayers();renderAdmin();}
    loadPlayers();
  </script>
</body>
</html>
